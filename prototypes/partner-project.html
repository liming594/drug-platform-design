<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目其他合作方 - CRO临床研究SaaS平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0891B2;
            --primary-light: #22D3EE;
            --primary-dark: #0E7490;
            --accent: #059669;
            --accent-light: #10B981;
            --bg: #ECFEFF;
            --bg-alt: #F0FDFA;
            --foreground: #164E63;
            --foreground-light: #155E75;
            --muted: #E8F1F6;
            --muted-dark: #CBD5E1;
            --border: #A5F3FC;
            --border-light: #CFFAFE;
            --destructive: #DC2626;
            --destructive-light: #FEE2E2;
            --warning: #F59E0B;
            --warning-light: #FEF3C7;
            --success: #059669;
            --success-light: #D1FAE5;
            --shadow-sm: 0 1px 2px rgba(22, 78, 99, 0.05);
            --shadow: 0 4px 6px -1px rgba(22, 78, 99, 0.1), 0 2px 4px -1px rgba(22, 78, 99, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(22, 78, 99, 0.1), 0 4px 6px -2px rgba(22, 78, 99, 0.05);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #E0F7FA 50%, var(--bg-alt) 100%);
            min-height: 100vh;
            color: var(--foreground);
            line-height: 1.6;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        /* Drawer Overlay */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .drawer-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .drawer {
            position: fixed;
            top: 0;
            right: -560px;
            bottom: 0;
            width: 560px;
            background: #fff;
            box-shadow: -4px 0 16px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            z-index: 1001;
        }
        .drawer-overlay.active .drawer {
            right: 0;
        }
        .drawer-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, var(--bg) 0%, white 100%);
        }
        .drawer-header-left {
            display: flex;
            flex-direction: column;
        }
        .drawer-breadcrumb {
            font-size: 12px;
            color: #6B7280;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .drawer-breadcrumb span {
            color: var(--primary);
            cursor: pointer;
        }
        .drawer-breadcrumb span:hover {
            text-decoration: underline;
        }
        .drawer-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--foreground);
        }
        .drawer-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: var(--muted);
            color: var(--foreground-light);
            font-size: 20px;
        }
        .drawer-close:hover {
            background: var(--destructive-light);
            color: var(--destructive);
        }
        .drawer-tabs {
            padding: 0 24px;
            border-bottom: 2px solid var(--muted);
            display: flex;
            gap: 0;
        }
        .drawer-tab {
            padding: 12px 16px;
            font-size: 14px;
            color: #6B7280;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .drawer-tab:hover {
            color: var(--primary);
        }
        .drawer-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 500;
        }
        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        .drawer-back {
            font-size: 13px;
            color: var(--primary);
            cursor: pointer;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .drawer-back:hover {
            text-decoration: underline;
        }
        .drawer-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--bg);
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--foreground-light);
            margin-bottom: 20px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.2s;
        }

        .breadcrumb a:hover {
            color: var(--primary-dark);
        }

        .breadcrumb span {
            color: var(--muted-dark);
        }

        .breadcrumb .current {
            color: var(--foreground);
            font-weight: 500;
        }

        /* Project Header */
        .project-header {
            background: linear-gradient(145deg, #ffffff 0%, rgba(255,255,255,0.95) 100%);
            border-radius: var(--radius);
            padding: 24px 28px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .project-header::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
            background: linear-gradient(180deg, var(--primary), var(--accent));
        }

        .project-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .project-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 4px 12px rgba(8, 145, 178, 0.3);
        }

        .project-details h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--foreground);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .project-code {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: var(--primary);
            background: rgba(8, 145, 178, 0.1);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .project-meta {
            display: flex;
            gap: 24px;
            margin-top: 8px;
        }

        .project-meta-item {
            font-size: 13px;
            color: var(--foreground-light);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .project-status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge.ongoing {
            background: var(--success-light);
            color: var(--success);
        }

        .status-badge.preparing {
            background: var(--warning-light);
            color: var(--warning);
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }

        /* Action buttons */
        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(8, 145, 178, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(8, 145, 178, 0.4);
        }

        .btn-secondary {
            background: white;
            color: var(--foreground);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg);
            border-color: var(--primary);
        }

        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .btn-outline:hover {
            background: rgba(8, 145, 178, 0.05);
        }

        /* Stats row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .mini-stat {
            background: rgba(255, 255, 255, 0.9);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .mini-stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .mini-stat-icon.cyan { background: rgba(8, 145, 178, 0.1); color: var(--primary); }
        .mini-stat-icon.purple { background: rgba(139, 92, 246, 0.1); color: #7C3AED; }
        .mini-stat-icon.green { background: rgba(5, 150, 105, 0.1); color: var(--accent); }
        .mini-stat-icon.orange { background: rgba(245, 158, 11, 0.1); color: var(--warning); }

        .mini-stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--foreground);
            font-family: 'Fira Code', monospace;
        }

        .mini-stat-label {
            font-size: 12px;
            color: var(--foreground-light);
            margin-top: 2px;
        }

        /* Table Container */
        .table-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--radius);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, rgba(232, 254, 255, 0.5) 0%, transparent 100%);
        }

        .table-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--foreground);
        }

        .table-info {
            font-size: 13px;
            color: var(--foreground-light);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--muted);
        }

        th {
            padding: 14px 20px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--foreground-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-light);
            transition: background 0.2s;
        }

        tbody tr {
            cursor: pointer;
            transition: all 0.2s;
        }

        tbody tr:hover {
            background: linear-gradient(90deg, rgba(232, 254, 255, 0.4) 0%, rgba(255, 255, 255, 0.4) 100%);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .company-name {
            font-weight: 600;
            color: var(--foreground);
        }

        /* Type Tags */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }

        .tag-lab {
            background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%);
            color: #1D4ED8;
        }

        .tag-irc {
            background: linear-gradient(135deg, #F3E8FF 0%, #E9D5FF 100%);
            color: #7C3AED;
        }

        .tag-data {
            background: linear-gradient(135deg, #CFFAFE 0%, #A5F3FC 100%);
            color: #0891B2;
        }

        .tag-stat {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            color: #B45309;
        }

        .tag-other {
            background: linear-gradient(135deg, #F1F5F9 0%, #E2E8F0 100%);
            color: #64748B;
        }

        /* Role Tags */
        .role-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .role-tag.primary {
            background: linear-gradient(135deg, #DCFCE7 0%, #BBF7D0 100%);
            color: #166534;
        }

        .role-tag.backup {
            background: linear-gradient(135deg, #FEF9C3 0%, #FEF08A 100%);
            color: #854D0E;
        }

        .role-tag.consultant {
            background: linear-gradient(135deg, #E0E7FF 0%, #C7D2FE 100%);
            color: #3730A3;
        }

        /* Contract Status Tag */
        .contract-status-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .contract-status-tag:hover {
            filter: brightness(0.95);
        }

        .contract-status-tag.valid {
            background: #D1FAE5;
            color: #059669;
        }

        .contract-status-tag.expiring {
            background: #FEF3C7;
            color: #D97706;
        }

        .contract-status-tag.expired {
            background: #FEE2E2;
            color: #DC2626;
        }

        .contract-status-tag.pending {
            background: #F3F4F6;
            color: #6B7280;
        }

        .contract-status-tag::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: var(--success-light);
            color: var(--success);
        }

        .status-badge.inactive {
            background: var(--muted);
            color: #64748B;
        }

        .status-badge::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        /* Clickable number */
        .clickable-number {
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .clickable-number:hover {
            text-decoration: underline;
        }

        /* Action Buttons */
        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--border);
            background: white;
            color: var(--foreground-light);
        }

        .btn-icon:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(8, 145, 178, 0.05);
        }

        .btn-icon.danger:hover {
            border-color: var(--destructive);
            color: var(--destructive);
            background: var(--destructive-light);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(22, 78, 99, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 700px;
            width: 90%;
            max-height: 90vh;
            overflow: hidden;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, var(--bg) 0%, white 100%);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--foreground);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            background: var(--muted);
            color: var(--foreground-light);
            font-size: 20px;
        }

        .modal-close:hover {
            background: var(--destructive-light);
            color: var(--destructive);
        }

        .modal-body {
            padding: 28px;
            overflow-y: auto;
            max-height: calc(90vh - 140px);
        }

        .modal-footer {
            padding: 16px 28px;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: var(--bg);
        }

        /* Progress Bar */
        .progress-bar {
            width: 100px;
            height: 8px;
            background: #E8F1F6;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: #059669;
            border-radius: 4px;
            transition: width 0.3s;
        }

        /* Form */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 20px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--foreground);
        }

        .form-label .required {
            color: var(--destructive);
            margin-left: 2px;
        }

        .form-input, .form-select {
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }

        /* Partner Search */
        .partner-search {
            position: relative;
        }

        .partner-search input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .partner-search input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }

        .partner-search::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        /* Partner dropdown */
        .partner-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            max-height: 240px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .partner-dropdown.show {
            display: block;
        }

        .partner-option {
            padding: 12px 14px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid var(--border-light);
        }

        .partner-option:last-child {
            border-bottom: none;
        }

        .partner-option:hover {
            background: rgba(8, 145, 178, 0.05);
        }

        .partner-option-name {
            font-weight: 500;
            color: var(--foreground);
            font-size: 14px;
        }

        .partner-option-meta {
            font-size: 12px;
            color: var(--foreground-light);
            margin-top: 2px;
        }

        /* Selected partner */
        .selected-partner {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            background: rgba(8, 145, 178, 0.05);
            border: 1px solid var(--primary);
            border-radius: var(--radius-sm);
            margin-top: 8px;
        }

        .selected-partner-name {
            flex: 1;
            font-weight: 500;
            color: var(--foreground);
        }

        .selected-partner-type {
            margin-right: 12px;
        }

        .selected-partner-remove {
            cursor: pointer;
            color: var(--foreground-light);
            font-size: 18px;
            transition: color 0.2s;
        }

        .selected-partner-remove:hover {
            color: var(--destructive);
        }

        /* Drawer Content Styles */
        .drawer-section {
            margin-bottom: 24px;
        }

        .drawer-section:last-child {
            margin-bottom: 0;
        }

        .drawer-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--foreground);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
        }

        .drawer-row {
            display: flex;

            renderDrawerContent(view, data);

        function drawerStackPop() {
            if (drawerStack.length > 1) {
                drawerStack.pop();
                const prev = drawerStack[drawerStack.length - 1];
                currentDrawerTab = prev.tab;
                updateDrawerBreadcrumb();
                renderDrawerContent(prev.view, prev.data);
            } else {
                drawerStack = [];
                document.getElementById('drawerOverlay').classList.remove('active');
                currentPartner = null;
            }

                breadcrumb.innerHTML = `<span onclick="drawerGoBack()">合作方详情</span> > ${current.title}`;

                document.getElementById('drawerEditBtn').style.display = 'none';

            if (drawerStack.length <= 1) {

                        <div class="drawer-row">
                            <div class="drawer-label">覆盖中心</div>
                            <div class="drawer-value"><span class="clickable-link" onclick="openCentersInDrawer(${partner.id})">${partner.centers}家<span class="center-count-badge">查看</span></span></div>
                        </div>
                        <div class="drawer-row">
                            <div class="drawer-label">项目联系人</div>
                            <div class="drawer-value">${partner.contact}</div>
                        </div>
                        <div class="drawer-row">
                            <div class="drawer-label">备注</div>
                            <div class="drawer-value">${partner.remark || '-'}</div>
                        </div>
                    </div>
                </div>
                <div class="tab-content" id="centersTab">
                    <div class="drawer-section">
                        <div class="drawer-section-title">覆盖中心 (${partner.centers}家)</div>
                        ${partner.centerList.length > 0 ? partner.centerList.map(center => `
                            <div class="center-item" onclick="drawerStackPush('center-detail', center, center.name)">
                                <div class="center-icon">🏥</div>
                                <div class="center-info">
                                    <div class="center-name">${center.name}</div>
                                    <div class="center-meta">${center.id} · ${center.breadcrumb}</div>
                                </div>
                            </div>
                        `).join('') : '<div style="text-align:center;padding:40px;color:#64748B;">暂无中心数据</div>'}
                    </div>
                </div>
                <div class="tab-content" id="feesTab">
                    <div class="drawer-section">
                        <div class="drawer-section-title">费用信息</div>
                        <div class="drawer-row">
                            <div class="drawer-label">合同金额</div>
                            <div class="drawer-value">¥${partner.contractAmount.toLocaleString()}</div>
                        </div>
                        <div class="drawer-row">
                            <div class="drawer-label">已执行</div>
                            <div class="drawer-value">¥${partner.contractExecuted.toLocaleString()}</div>
                        </div>
                        <div class="drawer-row">
                            <div class="drawer-label">剩余</div>
                            <div class="drawer-value">¥${(partner.contractAmount - partner.contractExecuted).toLocaleString()}</div>
                        </div>
                        <div class="drawer-row">
                            <div class="drawer-label">履行进度</div>
                            <div class="drawer-value">
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <div class="progress-bar">
                                        <div class="progress-bar-fill" style="width:${progress}%"></div>
                                    </div>
                                    <span style="font-size:12px;color:#64748B;">${progress}%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tab-content" id="contractsTab">
                    <div class="contract-preview">
                        <div class="contract-preview-header">
                            <div class="contract-preview-title">合同详情</div>
                            <span class="contract-status-tag ${contractStatusLabels[partner.contractStatus].class}">${contractStatusLabels[partner.contractStatus].text}</span>
                        </div>
                        <div class="contract-preview-row">
                            <div class="contract-preview-label">合同编号</div>
                            <div class="contract-preview-value" style="font-family:'Fira Code',monospace;">${partner.contractId}</div>
                        </div>
                        <div class="contract-preview-row">
                            <div class="contract-preview-label">合同金额</div>
                            <div class="contract-preview-value">¥${partner.contractAmount.toLocaleString()}</div>
                        </div>
                        <div class="contract-preview-row">
                            <div class="contract-preview-label">已执行</div>
                            <div class="contract-preview-value">¥${partner.contractExecuted.toLocaleString()}</div>
                        </div>
                        <div class="contract-preview-row">
                            <div class="contract-preview-label">履行进度</div>
                            <div class="contract-preview-value">
                                <div style="display:flex;align-items:center;gap:8px;">
                                    <div class="progress-bar">
                                        <div class="progress-bar-fill" style="width:${progress}%"></div>
                                    </div>
                                    <span style="font-size:12px;color:#64748B;">${progress}%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top: 16px;">
                        <span class="clickable-link" onclick="openContractInDrawer('${partner.contractId}')" style="color: var(--primary);">
                            📄 查看完整合同信息 →
                        </span>
                    </div>
                </div>
            `;
            switchDrawerTab(currentDrawerTab);
        }

        function renderPartnerCenters(partner) {
            const body = document.getElementById('drawerBody');
            body.innerHTML = `
                <div class="drawer-back" onclick="drawerGoBack()">← 返回合作方详情</div>
                <div class="drawer-section">
                    <div class="drawer-section-title">覆盖中心 (${partner.centers}家)</div>
                    ${partner.centerList.length > 0 ? partner.centerList.map(center => `
                        <div class="center-item" onclick="drawerStackPush('center-detail', center, center.name)">
                            <div class="center-icon">🏥</div>
                            <div class="center-info">
                                <div class="center-name">${center.name}</div>
                                <div class="center-meta">${center.id} · ${center.breadcrumb}</div>
                            </div>
                        </div>
                    `).join('') : '<div style="text-align:center;padding:40px;color:#64748B;">暂无中心数据</div>'}
                </div>
            `;
        }

        function renderCenterDetail(center) {
            const body = document.getElementById('drawerBody');
            body.innerHTML = `
                <div class="drawer-back" onclick="drawerGoBack()">← 返回覆盖中心</div>
                <div class="drawer-section">
                    <div class="drawer-section-title">中心信息</div>
                    <div class="drawer-row">
                        <div class="drawer-label">中心编号</div>
                        <div class="drawer-value" style="font-family:'Fira Code',monospace;">${center.id}</div>
                    </div>
                    <div class="drawer-row">
                        <div class="drawer-label">中心名称</div>
                        <div class="drawer-value">${center.name}</div>
                    </div>
                    <div class="drawer-row">
                        <div class="drawer-label">所属项目</div>
                        <div class="drawer-value">${center.breadcrumb.split(' > ')[0]}</div>
                    </div>
                </div>
            `;
        }

        function renderContractPreview(contractId) {
            // Find the contract from partners data
            const partner = partners.find(p => p.contractId === contractId);
            if (!partner) return;

            const progress = Math.round((partner.contractExecuted / partner.contractAmount) * 100);
            const body = document.getElementById('drawerBody');
            body.innerHTML = `
                <div class="drawer-back" onclick="drawerGoBack()">← 返回合作方详情</div>
                <div class="contract-preview">
                    <div class="contract-preview-header">
                        <div class="contract-preview-title">合同详情</div>
                        <span class="contract-status-tag ${contractStatusLabels[partner.contractStatus].class}">${contractStatusLabels[partner.contractStatus].text}</span>
                    </div>
                    <div class="contract-preview-row">
                        <div class="contract-preview-label">合同编号</div>
                        <div class="contract-preview-value" style="font-family:'Fira Code',monospace;">${partner.contractId}</div>
                    </div>
                    <div class="contract-preview-row">
                        <div class="contract-preview-label">合作方</div>
                        <div class="contract-preview-value">${partner.name}</div>
                    </div>
                    <div class="contract-preview-row">
                        <div class="contract-preview-label">合同金额</div>
                        <div class="contract-preview-value">¥${partner.contractAmount.toLocaleString()}</div>
                    </div>
                    <div class="contract-preview-row">
                        <div class="contract-preview-label">已执行</div>
                        <div class="contract-preview-value">¥${partner.contractExecuted.toLocaleString()}</div>
                    </div>
                    <div class="contract-preview-row">
                        <div class="contract-preview-label">履行进度</div>
                        <div class="contract-preview-value">
                            <div style="display:flex;align-items:center;gap:8px;">
                                <div class="progress-bar">
                                    <div class="progress-bar-fill" style="width:${progress}%"></div>
                                </div>
                                <span style="font-size:12px;color:#64748B;">${progress}%</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchDrawerTab(tab) {
            currentDrawerTab = tab;
            document.querySelectorAll('.drawer-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.querySelector(`.drawer-tab:nth-child(${
                tab === 'basic' ? 1 : 
                tab === 'centers' ? 2 : 
                tab === 'fees' ? 3 : 4
            })`).classList.add('active');
            
            const contentEl = document.getElementById(tab + 'Tab');
            if (contentEl) {
                contentEl.classList.add('active');
            }
        }

        // View detail
        function viewDetail(id) {
            currentPartner = partners.find(p => p.id === id);
            if (!currentPartner) return;

            drawerStack = [{ view: 'partner-detail', data: currentPartner, title: currentPartner.name, tab: 'basic' }];
            updateDrawerBreadcrumb();
            openDrawer();
            renderDrawerContent('partner-detail', currentPartner);
        }

        function openCentersInDrawer(partnerId) {
            const partner = partners.find(p => p.id === partnerId);
            if (!partner) return;

            drawerStackPush('partner-centers', partner, `覆盖中心 (${partner.centers}家)`);
        }

        function openContractInDrawer(contractId) {
            drawerStackPush('contract-preview', contractId, `合同详情 - ${contractId}`);
            renderContractPreview(contractId);
        }

        function editFromDrawer() {
            if (currentPartner) {
                closeDrawer();
                setTimeout(() => {
                    editRelation(currentPartner.id);
                }, 300);
            }
        }

        // Close dropdown on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.partner-search')) {
                document.getElementById('partnerDropdown').classList.remove('show');
            }
        });

        // Close drawer on overlay click
        document.getElementById('drawerOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('drawerOverlay')) {
                closeDrawer();
            }
        });

        // Close modal on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) {
                    overlay.classList.remove('active');
                }
            });
        });

        // Initialize
        renderTable();
    </script>
</body>
</html>
