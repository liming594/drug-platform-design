<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质量管理 - 中心驾驶舱</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#f5f6fa;color:#1f2937;font-size:14px;line-height:1.5}

/* 主容器 */
.quality-container{max-width:1400px;margin:0 auto;padding:20px}

/* 页面标题 */
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-title{font-size:18px;font-weight:600;color:#1f2937;display:flex;align-items:center;gap:8px}
.page-title i{color:#7c3aed}
.breadcrumb{font-size:13px;color:#6b7280;margin-top:4px}
.breadcrumb span{color:#7c3aed}

/* 主卡片 */
.main-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden}

/* 紧凑布局 */
.compact-layout{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.compact-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px}
.compact-card-title{font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.compact-card-title i{color:#7c3aed}

/* 筛选器 */
.filter-select{padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;color:#374151;background:#fff;min-width:120px}

/* 表格 */
.table-wrap{overflow-x:auto;border:1px solid #e5e7eb;border-radius:10px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#f8fafc}
th{padding:12px 14px;text-align:left;font-weight:600;color:#6b7280;font-size:12px;border-bottom:1px solid #e5e7eb;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
tbody tr:hover{background:#fafafa}
tbody tr:last-child td{border-bottom:none}

/* Badge标签 */
.badge{padding:3px 10px;border-radius:10px;font-size:12px;font-weight:500;display:inline-block;white-space:nowrap}
.badge-purple{background:#f5f3ff;color:#7c3aed}

/* 严重程度 */
.severity-critical{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.severity-major{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa}

/* 状态 */
.status-pending{background:#fef3c7;color:#d97706}
.status-closed{background:#dcfce7;color:#16a34a}

/* Toast提示 */
.toast{position:fixed;top:20px;right:20px;z-index:99999;padding:12px 20px;border-radius:10px;color:#fff;font-size:13px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,0.15);animation:slideIn 0.3s ease}
.toast-success{background:#059669}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* 响应式 */
@media(max-width:768px){
.compact-layout{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="quality-container">
    <!-- 页面标题 -->
    <div class="page-header">
        <div>
            <h1 class="page-title"><i class="fas fa-clipboard-check"></i> 质量管理</h1>
            <div class="breadcrumb" id="breadcrumb">中心驾驶舱 > <span>北京协和医院</span> > 质量管理</div>
        </div>
    </div>

    <!-- 主卡片 -->
    <div class="main-card">
        <!-- 中心选择 -->
        <div style="padding:20px">
            <select class="filter-select" id="l3-center-select" onchange="loadCenterData()" style="min-width:220px">
                <option value="C001">北京协和医院</option>
                <option value="C002">北医三院</option>
                <option value="C003">阜外心血管</option>
                <option value="C004">宣武医院</option>
            </select>
        </div>

        <!-- 紧凑统计卡片 -->
        <div class="compact-layout" style="padding:0 20px 20px">
            <div class="compact-card">
                <div class="compact-card-title"><i class="fas fa-search"></i> 发现统计</div>
                <div style="display:flex;gap:16px">
                    <div style="text-align:center">
                        <div style="font-size:28px;font-weight:700;color:#dc2626">2</div>
                        <div style="font-size:12px;color:#6b7280">关键偏差</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:28px;font-weight:700;color:#ea580c">3</div>
                        <div style="font-size:12px;color:#6b7280">主要不符</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:28px;font-weight:700;color:#d97706">4</div>
                        <div style="font-size:12px;color:#6b7280">轻微偏差</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:28px;font-weight:700;color:#6b7280">5</div>
                        <div style="font-size:12px;color:#6b7280">观察项</div>
                    </div>
                </div>
            </div>
            <div class="compact-card">
                <div class="compact-card-title"><i class="fas fa-check-double"></i> CAPA状态</div>
                <div style="display:flex;gap:16px">
                    <div style="text-align:center">
                        <div style="font-size:28px;font-weight:700;color:#2563eb">2</div>
                        <div style="font-size:12px;color:#6b7280">待处理</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:28px;font-weight:700;color:#ea580c">1</div>
                        <div style="font-size:12px;color:#6b7280">进行中</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:28px;font-weight:700;color:#d97706">1</div>
                        <div style="font-size:12px;color:#6b7280">待验证</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:28px;font-weight:700;color:#059669">5</div>
                        <div style="font-size:12px;color:#6b7280">已闭环</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 最近发现列表 -->
        <div style="padding:0 20px 20px">
            <div class="compact-card">
                <div class="compact-card-title"><i class="fas fa-list"></i> 最近发现（仅展示前5条）</div>
                <div class="table-wrap" style="border:none">
                    <table>
                        <thead>
                            <tr>
                                <th>编号</th>
                                <th>类型</th>
                                <th>严重程度</th>
                                <th>日期</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><span style="font-weight:500;color:#7c3aed">QF-2024-0001</span></td>
                                <td><span class="badge badge-purple">内部稽查</span></td>
                                <td><span class="badge severity-critical">关键偏差</span></td>
                                <td>2024-06-15</td>
                                <td><span class="badge status-pending">待审批</span></td>
                            </tr>
                            <tr>
                                <td><span style="font-weight:500;color:#7c3aed">QF-2024-0005</span></td>
                                <td><span class="badge badge-purple">内部稽查</span></td>
                                <td><span class="badge severity-major">主要不符</span></td>
                                <td>2024-06-05</td>
                                <td><span class="badge status-closed">已闭环</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div style="font-size:12px;color:#6b7280;text-align:center;margin-top:8px">以上为只读数据，无法进行编辑操作</div>
            </div>
        </div>
    </div>
</div>

<script>
// Toast提示
function showToast(message, type) {
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// 加载中心数据
function loadCenterData() {
    const select = document.getElementById('l3-center-select');
    const centerName = select.options[select.selectedIndex].text;
    document.getElementById('breadcrumb').innerHTML = `中心驾驶舱 > <span>${centerName}</span> > 质量管理`;
    showToast('中心数据加载成功', 'success');
}
</script>

</body>
</html>
